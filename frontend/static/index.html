<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云计算课程设计</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    main {
      max-width: 720px;
      margin: 72px auto;
      padding: 32px;
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    button {
      padding: 10px 16px;
      border: 0;
      border-radius: 6px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
    }

    pre {
      min-height: 48px;
      padding: 12px;
      background: #111827;
      color: #d1fae5;
      border-radius: 6px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>云计算课程设计</h1>
    <p>学号：<strong>2023112551</strong></p>
    <p>姓名：<strong>邓苏鑫</strong></p>
    <button id="ping">测试后端 /api/ping</button>
    <pre id="result">等待请求...</pre>
  </main>

  <script>
    document.getElementById("ping").addEventListener("click", async () => {
      const result = document.getElementById("result");
      result.textContent = "请求中...";

      try {
        const response = await fetch("/api/ping");
        result.textContent = JSON.stringify(await response.json(), null, 2);
      } catch (error) {
        result.textContent = "请求失败：" + error.message;
      }
    });
  </script>
</body>
</html>
